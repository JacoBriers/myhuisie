<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huisie – Cleaning Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Warm linen palette */
      --bg:           #FAF5EE;
      --surface:      #FFFDF9;
      --surface2:     #F2EAE0;
      --border:       #E5D9CC;
      --text:         #38302A;
      --text-muted:   #9C8E84;
      --accent:       #5C9474;   /* sage green */
      --accent-dark:  #477860;
      --accent-light: #DFF0E8;
      --danger:       #B85242;
      --danger-light: #FCEAE7;
      --warn:         #CC7A30;
      --warn-light:   #FCE8D0;
      --shadow-sm:    0 1px 3px rgba(80,55,30,.07), 0 1px 2px rgba(80,55,30,.05);
      --shadow:       0 3px 10px rgba(80,55,30,.09), 0 1px 3px rgba(80,55,30,.06);
      --shadow-card:  0 4px 16px rgba(80,55,30,.10), 0 1px 4px rgba(80,55,30,.06);
      --radius:       18px;
      --radius-sm:    12px;
      --radius-xs:    8px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 40px;
      /* subtle warm texture via gradient */
      background-image: radial-gradient(ellipse at 20% 0%, rgba(255,220,160,.18) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(150,200,170,.12) 0%, transparent 55%);
      background-attachment: fixed;
    }

    /* ── Header ── */
    header {
      max-width: 740px;
      margin: 0 auto 28px;
    }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 4px;
    }

    .header-brand h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--text);
    }
    .header-brand h1 .logo-accent { color: var(--accent); }
    .header-brand p {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 3px;
    }

    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.12s, box-shadow 0.12s, background 0.15s, opacity 0.15s;
    }
    button:active { transform: scale(0.95); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 9px 18px;
      box-shadow: 0 2px 6px rgba(92,148,116,.35);
    }
    .btn-primary:hover { background: var(--accent-dark); box-shadow: 0 3px 10px rgba(92,148,116,.4); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-muted);
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--text-muted); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      padding: 5px 9px;
      border: 1.5px solid transparent;
      font-size: 0.82rem;
    }
    .btn-danger:hover { background: var(--danger-light); border-color: var(--danger); }

    /* ── Main layout ── */
    main {
      max-width: 740px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Room card ── */
    .room-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .room-card:has(.room-body:not([style*="none"])),
    .room-card.open { box-shadow: var(--shadow-card), 0 0 0 2px var(--accent-light); }

    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
      background: linear-gradient(135deg, var(--surface) 60%, var(--surface2) 100%);
      transition: background 0.15s;
    }
    .room-card.open .room-header {
      background: linear-gradient(135deg, var(--accent-light) 0%, #eef7f2 100%);
    }
    .room-header:hover { filter: brightness(0.97); }

    .room-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .room-name { font-size: 1.1rem; font-weight: 800; }

    .room-progress {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
      border: 1px solid var(--border);
    }
    .room-progress.all-done {
      color: var(--accent-dark);
      background: var(--accent-light);
      border-color: var(--accent-light);
    }

    .chevron {
      font-size: 0.7rem;
      color: var(--text-muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .room-card.open .chevron { transform: rotate(90deg); }

    .room-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .room-body { display: none; border-top: 1.5px solid var(--border); }
    .room-card.open .room-body { display: block; }

    /* ── Tasks ── */
    .task-list { list-style: none; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .task-item:last-of-type { border-bottom: none; }
    .task-item.done { background: var(--accent-light); }

    /* Tick */
    .tick-btn {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(80,55,30,.08);
    }
    .tick-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light), inset 0 1px 3px rgba(80,55,30,.08);
    }
    .task-item.done .tick-btn {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(92,148,116,.4);
    }

    .tick-svg {
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      transition: stroke-dashoffset 0.32s cubic-bezier(.4,0,.2,1);
    }
    .task-item.done .tick-svg { stroke-dashoffset: 0; }

    .task-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 600;
      min-width: 0;
    }
    .task-item.done .task-name {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      color: var(--text-muted);
    }

    /* Timer */
    .timer-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

    .timer-display {
      font-size: 0.88rem;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      min-width: 48px;
      text-align: center;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 4px 6px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
    }
    .timer-display.running {
      color: var(--accent-dark);
      background: var(--accent-light);
      border-color: var(--accent-light);
    }
    .timer-display.expired {
      color: var(--danger);
      background: var(--danger-light);
      border-color: var(--danger-light);
    }

    .adj-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-xs);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .adj-btn:hover { background: var(--surface2); border-color: var(--text-muted); color: var(--text); }

    .play-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .play-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
    .play-btn.running {
      background: var(--warn-light);
      color: var(--warn);
      border-color: var(--warn);
      box-shadow: 0 2px 8px rgba(204,122,48,.25);
    }

    /* Add task row */
    .add-task-row {
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }
    .add-task-row input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .add-task-row input::placeholder { color: var(--text-muted); font-weight: 600; }
    .add-task-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

    /* Add room */
    .add-room-section {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: border-color 0.2s;
    }
    .add-room-section:focus-within { border-color: var(--accent); }
    .add-room-section input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .add-room-section input::placeholder { color: var(--text-muted); font-weight: 600; }
    .add-room-section input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-light); }

    /* Bottom bar */
    .bottom-bar {
      max-width: 740px;
      margin: 20px auto 0;
      display: flex;
      justify-content: flex-end;
    }

    /* ── Top-level tasks ── */
    .top-tasks-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .top-tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      gap: 10px;
      background: linear-gradient(135deg, #FFF5E0 0%, #FDE8C0 100%);
      border-bottom: 1.5px solid var(--border);
    }

    .top-tasks-title {
      font-size: 1.1rem;
      font-weight: 800;
    }

    /* Tick ripple */
    @keyframes ripple {
      0%   { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .ripple {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      animation: ripple 0.55s cubic-bezier(.4,0,.2,1) forwards;
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 540px) {
      body { padding: 12px 10px 40px; }
      input { font-size: 16px !important; }

      .header-brand h1 { font-size: 1.8rem; }
      .header-brand p { font-size: 0.85rem; }

      .room-header { padding: 14px 14px; }
      .room-name { font-size: 1rem; }
      .room-actions .btn-danger { padding: 10px 12px; font-size: 0.9rem; }

      .task-item {
        flex-wrap: wrap;
        padding: 12px 14px;
        gap: 10px;
        row-gap: 8px;
      }
      .task-item .btn-danger { order: 3; padding: 10px 12px; font-size: 0.9rem; }
      .task-item .timer-controls {
        order: 4;
        width: 100%;
        padding-left: 44px;
        gap: 8px;
      }

      .adj-btn { width: 40px; height: 40px; font-size: 1.2rem; border-radius: 10px; }
      .play-btn { width: 40px; height: 40px; font-size: 1rem; }
      .timer-display { font-size: 0.95rem; min-width: 54px; padding: 6px 8px; }

      .add-task-row { padding: 12px 14px; gap: 8px; }
      .add-room-section { padding: 14px; gap: 8px; }

      .btn-primary { padding: 11px 18px; font-size: 0.95rem; }
      .btn-ghost { padding: 10px 14px; font-size: 0.9rem; }
      .bottom-bar .btn-danger { padding: 10px 16px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-brand">
      <h1>Huisie <span class="logo-accent">🏡</span></h1>
      <p>Home cleaning tracker</p>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" id="resetDayBtn">Reset day</button>
      <button class="btn-ghost" id="copySetupBtn">Copy setup</button>
    </div>
  </div>
</header>

<main id="roomList"></main>

<div class="bottom-bar">
  <button class="btn-danger" id="resetBtn">Reset</button>
</div>

<script>
// ============================================================
// Factory defaults — used only when localStorage has no state
// ============================================================
const FACTORY = [
  {
    room: 'Kitchen',
    tasks: [
      { name: 'Tidy & wipe benches', minutes: 5 },
      { name: 'Clean stovetop',      minutes: 8 },
      { name: 'Clean sink',          minutes: 5 },
      { name: 'Mop floor',           minutes: 8 },
      { name: 'Empty bins',          minutes: 3 },
    ]
  },
  {
    room: 'Lounge',
    tasks: [
      { name: 'Tidy & declutter', minutes: 10 },
      { name: 'Vacuum',           minutes: 10 },
      { name: 'Dust surfaces',    minutes: 8  },
    ]
  },
  {
    room: 'Dining Room',
    tasks: [
      { name: 'Tidy & declutter',    minutes: 5 },
      { name: 'Wipe table & chairs', minutes: 5 },
      { name: 'Vacuum / mop floor',  minutes: 8 },
    ]
  },
  {
    room: 'Ensuite Bathroom',
    tasks: [
      { name: 'Clean toilet',        minutes: 5  },
      { name: 'Clean sink & mirror', minutes: 5  },
      { name: 'Clean shower',        minutes: 12 },
      { name: 'Mop floor',           minutes: 5  },
    ]
  },
  {
    room: 'Main Bedroom',
    tasks: [
      { name: 'Tidy & declutter', minutes: 10 },
      { name: 'Vacuum',           minutes: 10 },
      { name: 'Change bedding',   minutes: 15 },
      { name: 'Dust surfaces',    minutes: 5  },
    ]
  },
  {
    room: 'Bedroom 1',
    tasks: [
      { name: 'Tidy & declutter', minutes: 10 },
      { name: 'Vacuum',           minutes: 10 },
      { name: 'Change bedding',   minutes: 15 },
    ]
  },
  {
    room: 'Bedroom 2',
    tasks: [
      { name: 'Tidy & declutter', minutes: 10 },
      { name: 'Vacuum',           minutes: 10 },
      { name: 'Change bedding',   minutes: 15 },
    ]
  },
  {
    room: 'Playroom',
    tasks: [
      { name: 'Tidy toys',     minutes: 15 },
      { name: 'Vacuum',        minutes: 8  },
      { name: 'Wipe surfaces', minutes: 5  },
    ]
  },
  {
    room: 'Bathroom',
    tasks: [
      { name: 'Clean toilet',        minutes: 5  },
      { name: 'Clean sink & mirror', minutes: 5  },
      { name: 'Clean shower / bath', minutes: 15 },
      { name: 'Mop floor',           minutes: 5  },
    ]
  },
  {
    room: 'Toilet',
    tasks: [
      { name: 'Clean toilet',       minutes: 5 },
      { name: 'Wipe sink & mirror', minutes: 3 },
      { name: 'Mop floor',          minutes: 3 },
    ]
  },
];

// ============================================================
// State
// ============================================================
// Runtime shape:
//   { topTasks: [...], rooms: [{ id, name, open, tasks: [...] }] }
// Each task: { id, name, minutes, done, timerRunning, timerSeconds }
//
// Shareable "setup" shape:
//   { topTasks: [{ name, minutes }], rooms: [{ room, tasks: [{ name, minutes }] }] }

let _uid = 1;
function uid() { return _uid++; }

function makeTask(t) {
  const mins = t.minutes || 10;
  return { id: uid(), name: t.name, minutes: mins, done: false, timerRunning: false, timerSeconds: mins * 60 };
}

function setupToState(setup) {
  _uid = 1;
  const topTasks = (setup.topTasks || []).map(makeTask);
  const rooms = (setup.rooms || FACTORY).map((r, ri) => ({
    id: uid(),
    name: r.room,
    open: ri === 0,
    tasks: r.tasks.map(makeTask)
  }));
  return { topTasks, rooms };
}

// Extract shareable setup JSON from current state
function stateToSetup(st) {
  return {
    topTasks: st.topTasks.map(t => ({ name: t.name, minutes: t.minutes })),
    rooms: st.rooms.map(r => ({
      room: r.name,
      tasks: r.tasks.map(t => ({ name: t.name, minutes: t.minutes }))
    }))
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem('huisie');
    if (raw) {
      const parsed = JSON.parse(raw);
      // Backward-compat: old saves had no topTasks
      if (!parsed.topTasks) parsed.topTasks = [];
      // Restore _uid above existing max id to avoid collisions
      let max = 0;
      parsed.topTasks.forEach(t => { if (t.id > max) max = t.id; });
      parsed.rooms.forEach(r => {
        if (r.id > max) max = r.id;
        r.tasks.forEach(t => { if (t.id > max) max = t.id; });
      });
      _uid = max + 1;
      return parsed;
    }
  } catch (e) {}
  return setupToState({ topTasks: [], rooms: FACTORY });
}

function saveState() {
  localStorage.setItem('huisie', JSON.stringify(state));
}

let state = loadState();

// ============================================================
// Audio
// ============================================================
let _audioCtx = null;
function audioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTick() {
  try {
    const ctx = audioCtx(), o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.06);
    g.gain.setValueAtTime(0.4, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.2);
  } catch (_) {}
}

function playBeep() {
  try {
    const ctx = audioCtx(), t = ctx.currentTime;
    [0, 0.25, 0.5].forEach(off => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 660;
      g.gain.setValueAtTime(0.35, t + off);
      g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.18);
      o.start(t + off); o.stop(t + off + 0.2);
    });
  } catch (_) {}
}

// ============================================================
// Timers
// ============================================================
const timers = {}; // taskId -> intervalId

function findTask(id) {
  const top = state.topTasks.find(t => t.id === id);
  if (top) return top;
  for (const r of state.rooms) { const t = r.tasks.find(t => t.id === id); if (t) return t; }
  return null;
}

function fmt(seconds) {
  return `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, '0')}`;
}

function refreshTimerEl(taskId) {
  const el = document.getElementById(`timer-${taskId}`);
  if (!el) return;
  const task = findTask(taskId);
  if (!task) return;
  el.textContent = fmt(task.timerSeconds);
  el.className = 'timer-display' + (timers[taskId] ? ' running' : task.timerSeconds === 0 ? ' expired' : '');
}

function refreshPlayEl(taskId) {
  const btn = document.getElementById(`play-${taskId}`);
  if (!btn) return;
  const running = !!timers[taskId];
  btn.textContent = running ? '⏸' : '▶';
  btn.className = 'play-btn' + (running ? ' running' : '');
  btn.title = running ? 'Pause' : 'Start';
}

function startTimer(taskId) {
  if (timers[taskId]) return;
  const task = findTask(taskId);
  if (!task) return;
  task.timerRunning = true;
  saveState();
  timers[taskId] = setInterval(() => {
    const t = findTask(taskId);
    if (!t) { clearInterval(timers[taskId]); delete timers[taskId]; return; }
    if (t.timerSeconds > 0) { t.timerSeconds--; saveState(); refreshTimerEl(taskId); }
    if (t.timerSeconds === 0) {
      clearInterval(timers[taskId]); delete timers[taskId];
      t.timerRunning = false; saveState();
      playBeep(); refreshTimerEl(taskId); refreshPlayEl(taskId);
    }
  }, 1000);
  refreshTimerEl(taskId); refreshPlayEl(taskId);
}

function pauseTimer(taskId) {
  if (timers[taskId]) { clearInterval(timers[taskId]); delete timers[taskId]; }
  const task = findTask(taskId);
  if (task) { task.timerRunning = false; saveState(); }
  refreshTimerEl(taskId); refreshPlayEl(taskId);
}

function stopAllTimers() {
  Object.keys(timers).forEach(id => { clearInterval(timers[id]); delete timers[id]; });
}

// ============================================================
// Render
// ============================================================
function render() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';

  // ── Top-level tasks card ──
  const topDone = state.topTasks.filter(t => t.done).length;
  const topTotal = state.topTasks.length;
  const topAllDone = topTotal > 0 && topDone === topTotal;

  const topCard = document.createElement('div');
  topCard.className = 'top-tasks-card';
  topCard.id = 'topTasksCard';
  topCard.innerHTML = `
    <div class="top-tasks-header">
      <span class="top-tasks-title">📋 Tasks</span>
      <span class="room-progress${topAllDone ? ' all-done' : ''}" id="topTasksProgress">
        ${topTotal > 0 ? `${topDone}/${topTotal}` : ''}
      </span>
    </div>
    <ul class="task-list" id="topTasksList">
      ${state.topTasks.map(taskHTML).join('')}
    </ul>
    <div class="add-task-row">
      <input type="text" id="new-top-task" placeholder="Add a task…" maxlength="60" />
      <button class="btn-primary" id="addTopTaskBtn">Add</button>
    </div>`;
  list.appendChild(topCard);

  // Bind top-task events
  for (const task of state.topTasks) {
    const li = document.getElementById(`task-${task.id}`);
    if (li) bindTask(li, task, 'top');
  }
  bindAddTopTask();

  // ── Room cards ──
  for (const room of state.rooms) {
    const done = room.tasks.filter(t => t.done).length;
    const total = room.tasks.length;
    const allDone = total > 0 && done === total;

    const card = document.createElement('div');
    card.className = 'room-card' + (room.open ? ' open' : '');
    card.id = `room-${room.id}`;
    card.innerHTML = `
      <div class="room-header" data-room="${room.id}">
        <div class="room-title-row">
          <span class="chevron">▶</span>
          <span class="room-name">${esc(room.name)}</span>
          <span class="room-progress${allDone ? ' all-done' : ''}">${done}/${total}</span>
        </div>
        <div class="room-actions">
          <button class="btn-danger" data-del-room="${room.id}" title="Delete room">✕</button>
        </div>
      </div>
      <div class="room-body">
        <ul class="task-list" id="tasks-${room.id}">
          ${room.tasks.map(taskHTML).join('')}
        </ul>
        <div class="add-task-row">
          <input type="text" id="new-task-${room.id}" placeholder="Add task…" maxlength="60" />
          <button class="btn-primary" data-add-task="${room.id}">Add</button>
        </div>
      </div>`;
    list.appendChild(card);
  }

  const addRoomEl = document.createElement('div');
  addRoomEl.className = 'add-room-section';
  addRoomEl.innerHTML = `
    <input type="text" id="newRoomInput" placeholder="New room name…" maxlength="60" />
    <button class="btn-primary" id="addRoomBtn">Add room</button>`;
  list.appendChild(addRoomEl);

  bindEvents();

  const allTasks = [...state.topTasks, ...state.rooms.flatMap(r => r.tasks)];
  for (const task of allTasks) {
    if (task.timerRunning && task.timerSeconds > 0) startTimer(task.id);
    else { refreshTimerEl(task.id); refreshPlayEl(task.id); }
  }
}

function taskHTML(task) {
  return `
    <li class="task-item${task.done ? ' done' : ''}" id="task-${task.id}">
      <button class="tick-btn" data-tick="${task.id}">
        <svg width="14" height="14" viewBox="0 0 14 14">
          <polyline class="tick-svg" points="2,7 6,11 12,3"/>
        </svg>
      </button>
      <span class="task-name">${esc(task.name)}</span>
      <div class="timer-controls">
        <button class="adj-btn" data-adj="${task.id}" data-d="-1">−</button>
        <span class="timer-display" id="timer-${task.id}">${fmt(task.timerSeconds)}</span>
        <button class="adj-btn" data-adj="${task.id}" data-d="1">+</button>
        <button class="play-btn" id="play-${task.id}" data-play="${task.id}">▶</button>
      </div>
      <button class="btn-danger" data-del-task="${task.id}" title="Delete task">✕</button>
    </li>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// Event binding
// ============================================================
function bindEvents() {
  const list = document.getElementById('roomList');

  // Collapse/expand room
  list.querySelectorAll('.room-header').forEach(hdr => {
    hdr.addEventListener('click', e => {
      if (e.target.closest('[data-del-room]')) return;
      const rid = +hdr.dataset.room;
      const room = state.rooms.find(r => r.id === rid);
      if (!room) return;
      room.open = !room.open;
      saveState();
      document.getElementById(`room-${rid}`).classList.toggle('open', room.open);
    });
  });

  // Delete room
  list.querySelectorAll('[data-del-room]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const rid = +btn.dataset.delRoom;
      if (!confirm('Delete this room and all its tasks?')) return;
      state.rooms.find(r => r.id === rid)?.tasks.forEach(t => pauseTimer(t.id));
      state.rooms = state.rooms.filter(r => r.id !== rid);
      saveState(); render();
    });
  });

  // Tick complete
  list.querySelectorAll('[data-tick]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = +btn.dataset.tick;
      const task = findTask(tid);
      if (!task) return;
      task.done = !task.done;
      if (task.done) { pauseTimer(tid); playTick(); ripple(btn); }
      saveState();
      document.getElementById(`task-${tid}`).className = 'task-item' + (task.done ? ' done' : '');
      const room = state.rooms.find(r => r.tasks.some(t => t.id === tid));
      if (room) refreshProgress(room.id);
    });
  });

  // Timer ± buttons
  list.querySelectorAll('[data-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = +btn.dataset.adj, delta = +btn.dataset.d;
      const task = findTask(tid);
      if (!task) return;
      task.minutes = Math.max(1, task.minutes + delta);
      if (!timers[tid]) task.timerSeconds = task.minutes * 60;
      saveState(); refreshTimerEl(tid);
    });
  });

  // Play/pause
  list.querySelectorAll('[data-play]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = +btn.dataset.play;
      if (timers[tid]) { pauseTimer(tid); return; }
      const task = findTask(tid);
      if (task && task.timerSeconds === 0) task.timerSeconds = task.minutes * 60;
      startTimer(tid);
    });
  });

  // Delete task
  list.querySelectorAll('[data-del-task]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tid = +btn.dataset.delTask;
      pauseTimer(tid);
      for (const room of state.rooms) {
        const i = room.tasks.findIndex(t => t.id === tid);
        if (i !== -1) {
          room.tasks.splice(i, 1); saveState();
          document.getElementById(`task-${tid}`).remove();
          refreshProgress(room.id);
          break;
        }
      }
    });
  });

  // Add task
  list.querySelectorAll('[data-add-task]').forEach(btn => {
    const rid = +btn.dataset.addTask;
    const input = document.getElementById(`new-task-${rid}`);
    const doAdd = () => {
      const name = input.value.trim();
      if (!name) return;
      const room = state.rooms.find(r => r.id === rid);
      if (!room) return;
      const task = { id: uid(), name, minutes: 10, done: false, timerRunning: false, timerSeconds: 600 };
      room.tasks.push(task);
      saveState();
      input.value = '';
      const tmp = document.createElement('div');
      tmp.innerHTML = taskHTML(task);
      const li = tmp.firstElementChild;
      document.getElementById(`tasks-${rid}`).appendChild(li);
      bindTask(li, task, rid);
      refreshProgress(rid);
    };
    btn.addEventListener('click', doAdd);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  });

  // Add room
  const addRoomBtn = document.getElementById('addRoomBtn');
  const roomInput = document.getElementById('newRoomInput');
  const doAddRoom = () => {
    const name = roomInput.value.trim();
    if (!name) return;
    const rid = uid();
    state.rooms.push({ id: rid, name, open: true, tasks: [] });
    saveState(); roomInput.value = '';
    render();
    document.getElementById(`new-task-${rid}`)?.focus();
  };
  addRoomBtn.addEventListener('click', doAddRoom);
  roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAddRoom(); });
}

// Bind events for a single freshly-created task <li>
function bindTask(li, task, rid) {
  li.querySelector('[data-tick]').addEventListener('click', () => {
    task.done = !task.done;
    if (task.done) { pauseTimer(task.id); playTick(); ripple(li.querySelector('.tick-btn')); }
    saveState();
    li.className = 'task-item' + (task.done ? ' done' : '');
    refreshProgress(rid);
  });
  li.querySelector('[data-play]').addEventListener('click', () => {
    if (timers[task.id]) { pauseTimer(task.id); return; }
    if (task.timerSeconds === 0) task.timerSeconds = task.minutes * 60;
    startTimer(task.id);
  });
  li.querySelectorAll('[data-adj]').forEach(btn => {
    btn.addEventListener('click', () => {
      task.minutes = Math.max(1, task.minutes + +btn.dataset.d);
      if (!timers[task.id]) task.timerSeconds = task.minutes * 60;
      saveState(); refreshTimerEl(task.id);
    });
  });
  li.querySelector('[data-del-task]').addEventListener('click', () => {
    pauseTimer(task.id);
    if (rid === 'top') {
      state.topTasks = state.topTasks.filter(t => t.id !== task.id);
    } else {
      const room = state.rooms.find(r => r.id === rid);
      if (room) room.tasks = room.tasks.filter(t => t.id !== task.id);
    }
    saveState(); li.remove(); refreshProgress(rid);
  });
  refreshTimerEl(task.id); refreshPlayEl(task.id);
}

function ripple(btn) {
  const el = document.createElement('div');
  el.className = 'ripple';
  btn.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function refreshProgress(rid) {
  if (rid === 'top') { refreshTopProgress(); return; }
  const room = state.rooms.find(r => r.id === rid);
  if (!room) return;
  const done = room.tasks.filter(t => t.done).length, total = room.tasks.length;
  const el = document.querySelector(`#room-${rid} .room-progress`);
  if (el) {
    el.textContent = `${done}/${total}`;
    el.className = 'room-progress' + (total > 0 && done === total ? ' all-done' : '');
  }
}

function refreshTopProgress() {
  const el = document.getElementById('topTasksProgress');
  if (!el) return;
  const done = state.topTasks.filter(t => t.done).length, total = state.topTasks.length;
  el.textContent = total > 0 ? `${done}/${total}` : '';
  el.className = 'room-progress' + (total > 0 && done === total ? ' all-done' : '');
}

function bindAddTopTask() {
  const input = document.getElementById('new-top-task');
  const btn = document.getElementById('addTopTaskBtn');
  if (!input || !btn) return;
  const doAdd = () => {
    const name = input.value.trim();
    if (!name) return;
    const task = makeTask({ name, minutes: 10 });
    state.topTasks.push(task);
    saveState();
    input.value = '';
    const tmp = document.createElement('div');
    tmp.innerHTML = taskHTML(task);
    const li = tmp.firstElementChild;
    document.getElementById('topTasksList').appendChild(li);
    bindTask(li, task, 'top');
    refreshTopProgress();
  };
  btn.addEventListener('click', doAdd);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
}

// ============================================================
// Header / bottom buttons
// ============================================================

// Reset day — clear done state, keep rooms/tasks/timers
document.getElementById('resetDayBtn').addEventListener('click', () => {
  if (!confirm('Mark all tasks as not done and reset all timers?')) return;
  stopAllTimers();
  const resetTask = t => { t.done = false; t.timerRunning = false; t.timerSeconds = t.minutes * 60; };
  state.topTasks.forEach(resetTask);
  state.rooms.forEach(r => r.tasks.forEach(resetTask));
  saveState(); render();
});

// Copy setup — copies shareable JSON (rooms + tasks + minutes, no runtime state)
document.getElementById('copySetupBtn').addEventListener('click', () => {
  const setup = stateToSetup(state);
  const json = JSON.stringify(setup, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('copySetupBtn');
    const prev = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = prev; }, 1800);
  }).catch(() => {
    // Fallback: show in a prompt so user can manually copy
    prompt('Copy this setup JSON:', json);
  });
});

// Reset — clear localStorage and reload
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Clear all local data and reset to factory defaults?')) return;
  localStorage.removeItem('huisie');
  location.reload();
});

// ============================================================
// Init
// ============================================================
render();
</script>
</body>
</html>
